name: Documentation

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build-documentation:
    name: Build documentation site
    runs-on: ubuntu-latest

    steps:
      - name: Harden runner
        uses: step-security/harden-runner@v2
        with:
          egress-policy: audit

      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Install documentation dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r docs/requirements.txt
          sudo apt-get update
          sudo apt-get install --yes doxygen graphviz

      - name: Generate Javadoc
        run: mvn -B -ntp -pl spring-control-client -am javadoc:javadoc

      - name: Generate Doxygen site
        run: doxygen Doxyfile

      - name: Build MkDocs site
        run: python -m mkdocs build

      - name: Merge generated source reference into the Pages artifact
        run: |
          mkdir -p site/generated-source-reference
          cp -r build/doxygen/html/* site/generated-source-reference/

      - name: Upload documentation artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy-documentation:
    name: Deploy documentation site
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: build-documentation
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

name: Security

on:
  pull_request:
  push:
    branches:
      - main
  schedule:
    - cron: "23 4 * * *"

permissions:
  contents: read
  pull-requests: read
  security-events: write

jobs:
  dependency-review:
    name: Dependency review
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Detect dependency review support
        id: dependency_review_support
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python - <<'PY'
          import json
          import os
          import urllib.request

          request = urllib.request.Request(
              f"https://api.github.com/repos/{os.environ['GITHUB_REPOSITORY']}",
              headers={
                  "Accept": "application/vnd.github+json",
                  "Authorization": f"Bearer {os.environ['GITHUB_TOKEN']}",
                  "X-GitHub-Api-Version": "2022-11-28",
              },
          )
          with urllib.request.urlopen(request) as response:
              repository_payload = json.load(response)

          dependency_graph_status = repository_payload.get("security_and_analysis", {}) \
              .get("dependency_graph", {}) \
              .get("status")

          is_dependency_graph_enabled = dependency_graph_status == "enabled"
          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as output_file:
              output_file.write(
                  f"dependency_graph_enabled={'true' if is_dependency_graph_enabled else 'false'}\n"
              )
          PY

      - name: Harden runner
        if: steps.dependency_review_support.outputs.dependency_graph_enabled == 'true'
        uses: step-security/harden-runner@v2
        with:
          egress-policy: audit

      - name: Dependency review
        if: steps.dependency_review_support.outputs.dependency_graph_enabled == 'true'
        uses: actions/dependency-review-action@v4.9.0
        with:
          fail-on-severity: high
          deny-licenses: GPL-2.0, GPL-3.0, AGPL-3.0

      - name: Dependency review unavailable
        if: steps.dependency_review_support.outputs.dependency_graph_enabled != 'true'
        run: |
          echo "Dependency Graph is disabled for this repository." >> "$GITHUB_STEP_SUMMARY"
          echo "Enable it in Settings > Security > Advanced Security to restore GitHub-native dependency review." >> "$GITHUB_STEP_SUMMARY"

  secret-scan:
    name: Secret scan
    runs-on: ubuntu-latest
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@v2
        with:
          egress-policy: audit

      - name: Check out repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  filesystem-scan:
    name: Filesystem vulnerability scan
    runs-on: ubuntu-latest
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@v2
        with:
          egress-policy: audit

      - name: Check out repository
        uses: actions/checkout@v6

      - name: Run Trivy
        uses: aquasecurity/trivy-action@0.35.0
        with:
          scan-type: fs
          ignore-unfixed: true
          format: sarif
          output: trivy-results.sarif
          severity: CRITICAL,HIGH

      - name: Upload Trivy results
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: trivy-results.sarif

  codeql:
    name: CodeQL
    runs-on: ubuntu-latest
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@v2
        with:
          egress-policy: audit

      - name: Check out repository
        uses: actions/checkout@v6

      - name: Detect Java project files
        id: java_project_files
        shell: bash
        run: |
          if find . -name pom.xml -print -quit | grep -q . && find . -name '*.java' -print -quit | grep -q .; then
            echo "has_java_project=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_java_project=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Java
        if: steps.java_project_files.outputs.has_java_project == 'true'
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: CodeQL unavailable
        if: steps.java_project_files.outputs.has_java_project != 'true'
        run: |
          echo "No Java project files were found in this checkout." >> "$GITHUB_STEP_SUMMARY"
          echo "Skipping CodeQL for this branch snapshot." >> "$GITHUB_STEP_SUMMARY"

      - name: Initialize CodeQL
        if: steps.java_project_files.outputs.has_java_project == 'true'
        uses: github/codeql-action/init@v4
        with:
          languages: java

      - name: Autobuild
        if: steps.java_project_files.outputs.has_java_project == 'true'
        uses: github/codeql-action/autobuild@v4

      - name: Analyze
        if: steps.java_project_files.outputs.has_java_project == 'true'
        uses: github/codeql-action/analyze@v4

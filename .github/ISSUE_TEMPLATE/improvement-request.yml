name: Improvement request
description: Suggest an enhancement to code, docs, wiki content, or automation.
title: "[Improvement]: "
labels:
  - enhancement
body:
  - type: textarea
    id: motivation
    attributes:
      label: Motivation
      description: Explain why the improvement matters.
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposal
      description: Describe the change you would like to see.
    validations:
      required: true

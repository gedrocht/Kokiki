site_name: Kokiki Payroll Platform
site_description: Beginner-friendly documentation for the fictional Blue Sky Office Design payroll platform.
site_url: https://example.invalid/kokiki
repo_url: https://github.com/example/kokiki
repo_name: kokiki
theme:
  name: material
  features:
    - navigation.instant
    - navigation.sections
    - navigation.tabs
    - search.highlight
    - content.code.copy
nav:
  - Home: index.md
  - Tutorials:
      - Prerequisites And First Run: tutorials/prerequisites-and-first-run.md
      - Getting Started: tutorials/getting-started.md
      - First Payroll Run: tutorials/first-payroll-run.md
      - Reading The COBOL Source: tutorials/reading-the-cobol-source.md
  - Architecture:
      - System Overview: architecture/system-overview.md
      - Repository Tour: architecture/repository-tour.md
      - Logging And Observability: operations/logging-and-observability.md
  - Reference:
      - REST Endpoints: reference/rest-endpoints.md
      - External Libraries: reference/external-libraries.md
      - Generated Source Reference: reference/generated-source-reference.md
  - Wiki:
      - Wiki Software Deployment: wiki/wiki-software-deployment.md
markdown_extensions:
  - admonition
  - attr_list
  - footnotes
  - tables
  - toc:
      permalink: true

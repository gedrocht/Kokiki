spring:
  application:
    name: kokiki-payroll-control-client

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus,loggers
  endpoint:
    health:
      probes:
        enabled: true

logging:
  file:
    name: logs/payroll-control-client.log

company-payroll:
  execution-mode: demonstration
  cobol-executable-path: ""

services:
  wiki_database:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: kokiki_wiki
      POSTGRES_PASSWORD: change-this-password
      POSTGRES_USER: kokiki_wiki
    volumes:
      - wiki_database_data:/var/lib/postgresql/data

  wiki_application:
    image: ghcr.io/requarks/wiki:2
    depends_on:
      - wiki_database
    environment:
      DB_TYPE: postgres
      DB_HOST: wiki_database
      DB_PORT: 5432
      DB_NAME: kokiki_wiki
      DB_USER: kokiki_wiki
      DB_PASS: change-this-password
    ports:
      - "3000:3000"
    volumes:
      - ./pages:/kokiki-wiki-pages

volumes:
  wiki_database_data:
